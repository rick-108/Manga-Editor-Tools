name: RTN Manga — Background Importer

on:
  # ── تشغيل تلقائي كل 6 ساعات (رفع الصور المتبقية فقط) ──────────────────────
  schedule:
    - cron: "0 */6 * * *"

  # ── تشغيل يدوي من GitHub ────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      job:
        description: "اختر العملية"
        required: true
        default: "import-chapters"
        type: choice
        options:
          - import-chapters   # استيراد فصول جديدة
          - upload-pending    # رفع الصور المتبقية لتليجرام فقط

      manga_name:
        description: "اسم المانغا كما هو في الموقع — مثال: سولو ليفلنغ"
        required: false
        default: ""

      base_url:
        description: "رابط الفصل الأول — مثال: https://site.com/manga/title"
        required: false
        default: ""

      start_chapter:
        description: "رقم أول فصل"
        required: false
        default: "1"

      end_chapter:
        description: "رقم آخر فصل"
        required: false
        default: "10"

      delay_seconds:
        description: "ثواني الانتظار بين الفصول (افتراضي: 10)"
        required: false
        default: "10"

      auto_publish:
        description: "نشر الفصول تلقائياً بعد الاستيراد؟"
        type: boolean
        required: false
        default: true

      dry_run:
        description: "معاينة فقط بدون تغييرات (اختبار الروابط)"
        type: boolean
        required: false
        default: false

jobs:
  run:
    name: ${{ github.event.inputs.job || 'upload-pending (scheduled)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 ساعات كحد أقصى

    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: إعداد pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: تثبيت المكتبات
        run: pnpm install --frozen-lockfile

      # ── استيراد فصول جديدة (تشغيل يدوي فقط) ─────────────────────────────────
      - name: استيراد فصول
        if: github.event.inputs.job == 'import-chapters'
        env:
          NEON_DATABASE_URL:   ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          ARGS="--manga=${{ github.event.inputs.manga_name }}"
          ARGS="$ARGS --base-url=${{ github.event.inputs.base_url }}"
          ARGS="$ARGS --start=${{ github.event.inputs.start_chapter }}"
          ARGS="$ARGS --end=${{ github.event.inputs.end_chapter }}"
          ARGS="$ARGS --delay=${{ github.event.inputs.delay_seconds }}"
          [ "${{ github.event.inputs.auto_publish }}" = "false" ] && ARGS="$ARGS --no-publish"
          [ "${{ github.event.inputs.dry_run }}"     = "true"  ] && ARGS="$ARGS --dry-run"
          node scripts/chapter-importer.mjs $ARGS

      # ── رفع الصور المتبقية (تلقائي كل 6 ساعات + يدوي) ──────────────────────
      - name: رفع الصور المتبقية لتليجرام
        if: github.event.inputs.job == 'upload-pending' || github.event_name == 'schedule'
        env:
          NEON_DATABASE_URL:   ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          node scripts/telegram-uploader.mjs $ARGS
