name: RTN Manga — Background Importer

on:
  # ── تشغيل تلقائي كل 6 ساعات (رفع الصور المتبقية فقط) ──────────────────────
  schedule:
    - cron: "0 */6 * * *"

  # ── تشغيل يدوي من GitHub ────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      job:
        description: "اختر العملية"
        required: true
        default: "import-chapters"
        type: choice
        options:
          - import-chapters   # استيراد فصول جديدة
          - upload-pending    # رفع الصور المتبقية لتليجرام فقط

      manga_name:
        description: "اسم المانغا كما هو مسجّل في الموقع — مثال: سولو ليفلنغ"
        required: false
        default: ""

      base_url:
        description: "رابط قاعدة الفصول — مثال: https://site.com/manga/solo-leveling"
        required: false
        default: ""

      start_chapter:
        description: "رقم أول فصل"
        required: false
        default: "1"

      end_chapter:
        description: "رقم آخر فصل"
        required: false
        default: "10"

      delay_seconds:
        description: "ثواني الانتظار بين الفصول (افتراضي: 10)"
        required: false
        default: "10"

      auto_publish:
        description: "نشر الفصول تلقائياً بعد الاستيراد؟"
        type: boolean
        required: false
        default: true

      dry_run:
        description: "معاينة فقط بدون تغييرات (اختبار الروابط)"
        type: boolean
        required: false
        default: false

jobs:
  run:
    name: ${{ github.event.inputs.job || 'upload-pending (scheduled)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 ساعات كحد أقصى

    steps:
      # ── 1. سحب الكود ─────────────────────────────────────────────────────────
      - name: سحب الكود
        uses: actions/checkout@v4

      # ── 2. بيئة Node + pnpm ──────────────────────────────────────────────────
      - name: إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: إعداد pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 3. تثبيت المكتبات ────────────────────────────────────────────────────
      #   نستخدم --no-frozen-lockfile لتفادي أي تعارض في CI بعد إضافة مكتبات
      - name: تثبيت المكتبات (workspace)
        run: pnpm install --no-frozen-lockfile

      # ── 4. تحقق سريع أن المكتبات المطلوبة موجودة ──────────────────────────
      - name: التحقق من المكتبات
        run: |
          node -e "require('pg');    console.log('✅ pg')"       || (echo '❌ pg مفقود'      && exit 1)
          node -e "require('axios'); console.log('✅ axios')"    || (echo '❌ axios مفقود'   && exit 1)
          node -e "require('cheerio'); console.log('✅ cheerio')" || (echo '❌ cheerio مفقود' && exit 1)
        working-directory: scripts

      # ── 5a. استيراد فصول جديدة (تشغيل يدوي) ────────────────────────────────
      - name: استيراد فصول
        if: github.event.inputs.job == 'import-chapters'
        env:
          NEON_DATABASE_URL:    ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:  ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # نمرّر القيم كـ env vars لتجنب مشكلة المسافات والأحرف العربية في shell
          IMPORTER_MANGA_NAME:  ${{ github.event.inputs.manga_name }}
          IMPORTER_BASE_URL:    ${{ github.event.inputs.base_url }}
          IMPORTER_START:       ${{ github.event.inputs.start_chapter }}
          IMPORTER_END:         ${{ github.event.inputs.end_chapter }}
          IMPORTER_DELAY:       ${{ github.event.inputs.delay_seconds }}
          IMPORTER_PUBLISH:     ${{ github.event.inputs.auto_publish }}
          IMPORTER_DRY_RUN:     ${{ github.event.inputs.dry_run }}
        run: node scripts/chapter-importer.mjs

      # ── 5b. رفع الصور المتبقية (تلقائي كل 6 ساعات + يدوي) ─────────────────
      - name: رفع الصور المتبقية لتليجرام
        if: github.event.inputs.job == 'upload-pending' || github.event_name == 'schedule'
        env:
          NEON_DATABASE_URL:    ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:  ${{ secrets.TELEGRAM_CHANNEL_ID }}
          IMPORTER_DRY_RUN:     ${{ github.event.inputs.dry_run }}
        run: node scripts/telegram-uploader.mjs
