name: Telegram Uploader — رفع صفحات المانغا

on:
  # تشغيل تلقائي كل 6 ساعات
  schedule:
    - cron: "0 */6 * * *"

  # تشغيل يدوي من واجهة GitHub مع خيارات اختيارية
  workflow_dispatch:
    inputs:
      manga_id:
        description: "رقم المانغا (اتركه فارغاً للكل)"
        required: false
        default: ""
      chapter_id:
        description: "رقم الفصل المحدد (اتركه فارغاً للكل)"
        required: false
        default: ""
      dry_run:
        description: "معاينة فقط بدون رفع فعلي"
        type: boolean
        required: false
        default: false

jobs:
  upload:
    name: رفع الصفحات إلى Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 120  # حد أقصى ساعتين للفصول الكبيرة

    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: إعداد pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: تثبيت المكتبات
        run: pnpm install --frozen-lockfile

      - name: تشغيل الـ Worker (كل الصفحات)
        if: github.event_name == 'schedule'
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: node scripts/telegram-uploader.mjs

      - name: تشغيل الـ Worker (تشغيل يدوي)
        if: github.event_name == 'workflow_dispatch'
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.manga_id }}"   ] && ARGS="$ARGS --manga-id=${{ github.event.inputs.manga_id }}"
          [ -n "${{ github.event.inputs.chapter_id }}" ] && ARGS="$ARGS --chapter-id=${{ github.event.inputs.chapter_id }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          node scripts/telegram-uploader.mjs $ARGS
