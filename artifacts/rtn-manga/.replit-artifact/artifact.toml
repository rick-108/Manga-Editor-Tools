kind = "web"
previewPath = "/"
title = "RTN Manga"
version = "1.0.0"
id = "artifacts/rtn-manga"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21301

[services.development]
run = "pnpm --filter @workspace/rtn-manga run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rtn-manga", "run", "build" ]
publicDir = "artifacts/rtn-manga/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21301"
BASE_PATH = "/"
